name: corndogs-csil-gen-check
description: "Validate the CSIL and fail if the committed generated clients are stale"
triggers:
  events:
    - pull_request_opened
    - pull_request_updated
  branches:
    - main
paths:
  include:
    - "csil/**"
    - "clients/**"
job:
  # BUILD csilgen at the rev corndogs pins (csil/generate.sh's CSILGEN_REV) instead of
  # baking it into a runner image — so bumping the rev needs no image rebuild, and the
  # check can never drift from / lag behind the binary. A stock rust image has the
  # cargo + C toolchain csilgen needs; runnerbase ships only curl/git/bash and can't
  # compile it. Everything writes to /tmp, so any uid works (incl. `reactorcide run-local`).
  image: rust:1-bookworm
  command: |
    set -e
    # NB: do NOT set CARGO_TARGET_DIR — xtask install-wasm reads a relative
    # target/wasm32-unknown-unknown/release. The csilgen clone lives under /tmp (cloned
    # by this uid), so its default ./target is writable.
    export HOME=/tmp/home CARGO_HOME=/tmp/cargo
    mkdir -p "$HOME" "$CARGO_HOME"

    if [ "${REACTORCIDE_WORKER_MODE:-remote}" = "local" ]; then
      cd /job/src
    else
      git clone --branch "${REACTORCIDE_HEAD_REF:-$REACTORCIDE_PR_REF}" \
        "${REACTORCIDE_HEAD_URL:-$REACTORCIDE_SOURCE_URL}" /job/src
      cd /job/src
    fi

    # Single source of truth for the rev: the pin in generate.sh.
    CSILGEN_REV="$(sed -n 's/^CSILGEN_REV="\([^"]*\)".*/\1/p' csil/generate.sh)"
    echo "=== building csilgen @ ${CSILGEN_REV} ==="
    git clone https://github.com/catalystcommunity/csilgen /tmp/csilgen
    git -C /tmp/csilgen checkout "${CSILGEN_REV}"
    ( cd /tmp/csilgen \
        && rustup target add wasm32-unknown-unknown \
        && cargo build -p csilgen --release \
        && cargo run -p xtask install-wasm )
    export PATH="/tmp/csilgen/target/release:${PATH}"   # the csilgen CLI; generators land in $HOME/.csilgen

    echo "=== validate + regenerate + diff ==="
    csilgen validate --input csil/corndogs.csil
    ./csil/generate.sh                 # all generated packages land under clients/ (incl. the Go module clients/corndogs)
    git diff --exit-code -- clients/ || {
      echo ""
      echo "Generated code is stale — run ./csil/generate.sh and commit the result."
      exit 1
    }
    echo "Generated clients are up to date."
  timeout: 1800          # builds csilgen + its wasm generators from source
  priority: 10
  raw_command: true
