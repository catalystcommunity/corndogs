[project]
name = "corndogs-client"
version = "0.0.0"
description = "CBOR-over-HTTP Python client for corndogs, generated from CSIL"
requires-python = ">=3.9"
dependencies = ["cbor2>=5.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
